services:
  dm-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: dm-api
    env_file:
      - .env
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "uvicorn src.api.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --log-level info"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - dm-net

  dm-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: dm-bot
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - dm-net

networks:
  dm-net:
    name: dm-net
    driver: bridge
